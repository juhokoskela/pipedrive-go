name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.0", "1.26.1"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Pin toolchain to installed version
        run: echo "GOTOOLCHAIN=local" >> "$GITHUB_ENV"

      - name: Generate (drift check)
        run: |
          make generate
          git diff --exit-code

      - name: Docs (drift check)
        run: |
          make docs
          git diff --exit-code

      - name: Format
        run: test -z "$(gofmt -l .)"

      - name: Lint
        if: matrix.go == '1.26.1'
        run: make lint

      - name: Test
        run: go test ./...

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: "1.26.1"
          cache: true

      - name: Security
        run: make security
