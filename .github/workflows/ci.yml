name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go: ["1.25.0", "1.26.5"]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Pin toolchain to installed version
        run: echo "GOTOOLCHAIN=local" >> "$GITHUB_ENV"

      - name: Generate (drift check)
        run: |
          make generate
          git diff --exit-code

      - name: Docs (drift check)
        run: |
          make docs
          git diff --exit-code

      - name: Format
        run: test -z "$(gofmt -l .)"

      - name: Lint
        if: matrix.go == '1.26.5'
        run: make lint

      - name: Test
        run: go test ./...

      - name: SDK coverage
        if: matrix.go == '1.26.5'
        run: go test -coverprofile=/tmp/pipedrive-go.cover -covermode=count ./pipedrive ./pipedrive/v1 ./pipedrive/v2

      - name: Coveralls
        if: matrix.go == '1.26.5'
        uses: coverallsapp/github-action@648a8eb78e6d50909eff900e4ec85cab4524a45b # v2.3.6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: /tmp/pipedrive-go.cover
          format: golang
          coverage-reporter-version: v0.6.17

  security:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          cache: true

      - name: Security
        run: make security
